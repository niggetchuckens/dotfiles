##############################
### WINDOWS AND WORKSPACES ###
##############################

# Allow games to bypass the compositor
allow_tearing = true

##############################
###       APPEARANCE       ###
##############################

general {
    gaps_in = 6
    gaps_out = 10
    border_size = 2
    
    # Catppuccin Mocha: Purple to Blue gradient (matches waybar theme)
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(1e1e2eff)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 15
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 4
        passes = 3
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4.79, easeOutQuint
    animation = workspaces, 1, 1.94, default, fade
    
    # 1. Default layer animation (Fade for Rofi, Waybar, etc.)
    animation = layers, 1, 2, default, fade
}
